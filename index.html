<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Alte Heide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
    }

    .departure {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #222;
      padding: 15px 0;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .line {
      background: #0056ff;
      padding: 10px 18px;
      font-size: 28px;
      font-weight: bold;
      border-radius: 8px;
    }

    .destination {
      font-size: 32px;
    }

    .time {
      font-size: 48px;
      font-weight: bold;
      color: #00ff99;
      min-width: 100px;
      text-align: right;
    }
  </style>
</head>
<body>

<h1>Alte Heide</h1>
<div id="departures">Lade...</div>

<script>
async function loadDepartures() {
  try {
    const res = await fetch("/api/departures");
    const data = await res.json();

    const container = document.getElementById("departures");
    container.innerHTML = "";

    data.departures
      .filter(dep => dep.label.includes("U")) // nur U-Bahn
      .slice(0, 6)
      .forEach(dep => {

        const minutes = Math.max(0, Math.round(
          (new Date(dep.plannedDepartureTime).getTime() - Date.now()) / 60000
        ));

        const div = document.createElement("div");
        div.className = "departure";

        div.innerHTML = `
          <div class="left">
            <div class="line">${dep.label}</div>
            <div class="destination">${dep.destination}</div>
          </div>
          <div class="time">${minutes} min</div>
        `;

        container.appendChild(div);
      });

  } catch (e) {
    document.getElementById("departures").innerText = "Keine Daten";
  }
}

loadDepartures();
setInterval(loadDepartures, 30000);
</script>

</body>
</html>
