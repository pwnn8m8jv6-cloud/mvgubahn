<!DOCTYPE html>
<html lang="de">
<head>

  <title>U-Bahn Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;

      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;

<h1>Alte Heide</h1>

}
</script>
